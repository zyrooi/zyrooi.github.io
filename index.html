<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Share Hack Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #f2f2f2;
    }

    header {
      background-color: #004e98;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .search-bar {
      max-width: 600px;
      margin: 20px auto 0;
      padding: 0 20px;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .news-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .news-card {
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .news-card:hover {
      transform: translateY(-4px);
    }

    .news-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .news-content {
      padding: 16px;
    }

    .news-title {
      font-size: 20px;
      font-weight: bold;
      margin: 0 0 10px;
    }

    .news-desc {
      font-size: 15px;
      color: #555;
    }

    .news-date {
      font-size: 13px;
      color: #999;
      text-align: right;
      margin-top: 10px;
    }

  </style>
</head>
<body>
  <header>Share Hack</header>

  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Tìm Hack, Script">
  </div>

  <div class="news-container">
    
    <a href="https://zyrooi.github.io/client-mod" class="news-card">
      <img src="https://i.imgur.com/G816Krm.jpeg" alt="Ảnh bài viết demo">
      <div class="news-content">
        <div class="news-title">Hack Blox Fruit</div>
        <div class="news-desc">Hack Blox Fruit Full Client</div>
        <div class="news-date">16/04/2025</div>
      </div>
    </a>
    <a href="https://zyrooi.github.io/script-bloxfruit" class="news-card">
      <img src="https://i.imgur.com/G816Krm.jpeg" alt="Ảnh bài viết demo">
      <div class="news-content">
        <div class="news-title">Blox Fruit Script</div>
        <div class="news-desc">Script Blox Fruit Cho Anh Em Cụt Tay</div>
        <div class="news-date">16/04/2025</div>
      </div>
    </a>
  </div>


  <script>
    const searchInput = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".news-card");

    searchInput.addEventListener("input", function () {
      const keyword = this.value.toLowerCase();

      cards.forEach(card => {
        const title = card.querySelector(".news-title").textContent.toLowerCase();
        const desc = card.querySelector(".news-desc").textContent.toLowerCase();

        if (title.includes(keyword) || desc.includes(keyword)) {
          card.style.display = "flex";
        } else {
          card.style.display = "none";
        }
      });
    });
  </script>
</body>
</html>
