<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Hub</title>
    <style>
        @keyframes neonGlow {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle, #440088, #000000);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(90deg, #ff0000, #ff7300, #ffeb00, #47ff00, #00ffff, #2400ff, #ff00ff);
            background-size: 400% 400%;
            animation: neonGlow 2s infinite alternate;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
            padding: 20px;
        }

        .search-box {
            margin: 20px auto;
            max-width: 400px;
        }

        input {
            width: 80%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ff00ff;
            border-radius: 25px;
            text-align: center;
            outline: none;
            background-color: black;
            color: white;
            box-shadow: 0 0 15px #ff00ff;
        }

        input:focus {
            border-color: #ffff00;
            box-shadow: 0 0 20px #ffff00;
        }

        .container {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .script-card {
            width: 250px;
            height: 200px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #ffeb00, #47ff00, #00ffff, #2400ff, #ff00ff);
            background-size: 400% 400%;
            animation: neonGlow 2s infinite alternate;
            border-radius: 15px;
            box-shadow: 0px 0px 20px white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .script-card img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            box-shadow: 0 0 15px white;
        }

        .script-card p {
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            color: #222222;
            margin: 10px 0;
        }

        .btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 10px white;
        }

        .btn:hover {
            background: linear-gradient(45deg, #ffff00, #ff0000);
            box-shadow: 0 0 20px #ffff00;
        }
    </style>
</head>
<body>
    <header>Kaiser Hub</header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="🔎 Tìm Kiếm Game..." onkeyup="searchScript()">
    </div>

    <div class="container" id="script-list">
        <!-- XÓA HẾT CÁC DANH MỤC CÓ SẴN, MÀY TỰ THÊM -->
    </div>

    <script>
        function searchScript() {
            let input = document.getElementById("search-input").value.toLowerCase();
            let cards = document.getElementsByClassName("script-card");

            for (let card of cards) {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
