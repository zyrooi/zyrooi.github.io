<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            text-align: center;
        }

        header {
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff0000, #ffff00);
            background-size: 400% 400%;
            animation: twinkle 3s infinite ease-in-out;
            color: white;
            padding: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
        }

        /* Scrolling Frame */
        .scrolling-textbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            flex-direction: column;
        }

        .scrolling-textbox-label {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ff00ff;
        }

        .scrolling-textbox {
            width: 80%;
            max-width: 600px;
            padding: 10px;
            font-size: 16px;
            color: white;
            background-color: #111;
            border: 1px solid #ccc;
            border-radius: 25px;
            text-align: center;
            white-space: nowrap;
            overflow-x: auto; /* Cho phép cuộn ngang */
            cursor: not-allowed; /* Không cho phép chỉnh sửa */
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }

        .scrolling-textbox:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 1);
        }

        /* Button Sao Chép */
        .copy-btn {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #ff00ff;
            color: white;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .copy-btn:hover {
            background-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <header>🌟 Blox Fruit  🌟</header>

    <div class="scrolling-textbox-container">
      <div class="scrolling-textbox-label">Redz Script</div>
        
        <input type="text" class="scrolling-textbox" value="https://anotepad.com/notes/imwr5t8p" readonly id="scrolling-textbox">
        <!-- Nút sao chép -->
        <button class="copy-btn" onclick="copyText()">Sao Chép</button>
    </div>
    <div class="script-card">
            <div class="script-name">Blox Fruit</div>
            <div class="script-description">Full Script Blox Fruit</div>
            <a class="btn" href="https://anotepad.com/notes/imwr5t8p" target="_blank">Truy Cập</a>
    </div>
  
    </div>

    <script>
        function copyText() {
            const textbox = document.getElementById("scrolling-textbox");
            textbox.select();  // Chọn toàn bộ nội dung
            document.execCommand("copy");  // Sao chép nội dung vào clipboard

            // Thông báo đã sao chép
            alert("Đã sao chép nội dung!");
        }
    </script>
</body>
</html>
