<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Hack</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    header {
      background-color: #004e98;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .content-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .content-container img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
    }

    .article-title {
      font-size: 32px;
      font-weight: bold;
      margin-top: 20px;
    }

    .article-date {
      font-size: 14px;
      color: #999;
      text-align: right;
    }

    .article-body {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    .button-wrapper {
      max-width: 360px;
      margin: 30px auto;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 12px;
    }

    .button-group {
      display: flex;
      overflow: hidden;
      border-radius: 12px;
    }

    .button-group a {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .button-group a:first-child {
      background-color: red;
    }

    .button-group a:last-child {
      background-color: green;
    }

    .button-group a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <header>Fluxus Client</header>

  <div class="content-container">
    <img src="https://i.imgur.com/BfUWaNl.jpeg" alt="Ảnh bài viết chi tiết">
    <div class="article-title">Tải Client Fluxus</div>
    <div class="article-date">16/04/2025</div>
    <div class="article-body">
<p> Bản Quyền Link Tải Thuộc Về Bandishare.io</p>
      </div>
  </div>

  <div class="button-wrapper">
    <div class="button-group">
      <a href="https://bandishare.io/">Tải Link 1</a>
      <a href="https://bandishare.io/">Tải Link 2</a>
    </div>
  </div>

</body>
</html>
