<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bài Viết Chi Tiết</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    header {
      background-color: #004e98;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .content-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .content-container img {
      width: 100%;
      height: 250px; /* Chỉnh chiều cao của ảnh */
      object-fit: cover;
      border-radius: 10px;
    }

    .article-title {
      font-size: 32px;
      font-weight: bold;
      margin-top: 20px;
    }

    .article-date {
      font-size: 14px;
      color: #999;
      text-align: right;
    }

    .article-body {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    .button-wrapper {
      max-width: 360px;
      margin: 30px auto;
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 12px;
    }

    .button-group {
      display: flex;
      overflow: hidden;
      border-radius: 12px;
    }

    .button-group a {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .button-group a:first-child {
      background-color: red;
    }

    .button-group a:last-child {
      background-color: green;
    }

    .button-group a:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <header>Blox Fruit Script</header>

  <div class="content-container">
    <img src="https://i.imgur.com/x23lHhE.jpeg" alt="Ảnh bài viết chi tiết"> <!-- Đã thay chiều cao ảnh thành 250px -->
    <div class="article-title">Blox Fruit</div>
    <div class="article-date">16/04/2025</div>
    <div class="article-body">
      <p>Redz Hub:</p>
      <p>loadstring(game:HttpGet("https://raw.githubusercontent.com/newredz/BloxFruits/refs/heads/main/Source.luau"))()</p>
      <p>Shark X Hub</p>
      <p>loadstring(game:HttpGet("https://shorturl.at/kyOxL"))()</p>
    </div>
  </div>



</body>
</html>
