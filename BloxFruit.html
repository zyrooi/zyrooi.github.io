<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiser Hub</title>
    <style>
        @keyframes neonGlow {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle, #440088, #000000);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(90deg, #ff0000, #ff7300, #ffeb00, #47ff00, #00ffff, #2400ff, #ff00ff);
            background-size: 400% 400%;
            animation: neonGlow 2s infinite alternate;
            color: white;
            font-size: 24px;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff00ff, 0 0 30px #00ffff;
            padding: 20px;
        }

        .script-wrapper {
            width: 80%;
            max-width: 600px;
            margin: 30px auto;
            text-align: center;
        }

        .script-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 15px white;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .copy-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px 10px 0 0;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px white;
            transition: 0.3s;
            display: block;
        }

        .copy-btn:hover {
            background: linear-gradient(45deg, #ffff00, #ff0000);
            box-shadow: 0 0 20px #ffff00;
        }

        .script-box {
            width: 100%;
            max-height: 200px;
            background: #222;
            color: #00ff00;
            padding: 15px;
            border: none;
            border-radius: 0 0 10px 10px;
            font-size: 14px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: pre;
            word-wrap: normal;
            resize: none;
            outline: none;
            display: block;
        }

        /* Phần tiêu đề + mô tả */
        .info-container {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px white;
            text-align: center;
        }

        .info-title {
            font-size: 20px;
            font-weight: bold;
            color: yellow;
            text-shadow: 0 0 10px white;
        }

        .info-description {
            font-size: 14px;
            color: lightgray;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <header>Kaiser Hub</header>

<div class="script-wrapper">
        <div class="script-container">
<div class="info-container">
            <div class="info-title" id="script-title">🔥 Speed Hub  🔥</div>
            <div class="info-description" id="script-description">Script này giúp bạn tự động farm tài nguyên trong game.</div>
        </div>
            <button class="copy-btn" onclick="copyScript()">Sao Chép</button>
            <textarea id="script-content" class="script-box" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/AhmadV99/Speed-Hub-X/main/Speed%20Hub%20X.lua", true))()")

            </textarea>
        </div>

        <!-- Phần tiêu đề + mô tả -->
        
    </div>
<div class="script-wrapper">
        <div class="script-container">
<div class="info-container">
            <div class="info-title" id="script-title">🔥 Redz Hub 🔥</div>
            <div class="info-description" id="script-description">Script này giúp bạn tự động farm tài nguyên trong game.</div>
        </div>
            <button class="copy-btn" onclick="copyScript()">Sao Chép</button>
            <textarea id="script-content" class="script-box" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/realredz/BloxFruits/refs/heads/main/Source.lua"))()")
            </textarea>
        </div>

        <!-- Phần tiêu đề + mô tả -->
        
</div>
    </div>

    <script>
        function copyScript() {
            let scriptText = document.getElementById("script-content");
            scriptText.select();
            scriptText.setSelectionRange(0, 99999); // Chọn toàn bộ nội dung
            document.execCommand("copy");
            alert("✅ Đã sao chép nội dung!");
        }
    </script>
</body>
</html>
